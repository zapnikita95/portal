# Сборка debug APK (Buildozer).
# — Артефакт Actions: portal-debug-apk
# — GitHub Release: тег portal-android-latest, файл Portal-Android.apk (для кнопки «Скачать» в десктопе)
# Локально: см. portal-android/Dockerfile
name: Portal Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "portal-android/**"
      - ".github/workflows/portal-android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: APT deps (Buildozer / p4a)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-venv wget \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Pip (buildozer, cython)
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            portal-android/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('portal-android/buildozer.spec', 'portal-android/**/*.py') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: buildozer android debug
        working-directory: portal-android
        run: buildozer android debug

      - name: Prepare APK for release (stable file name)
        working-directory: portal-android/bin
        run: |
          set -e
          shopt -s nullglob
          files=( *.apk )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No APK in portal-android/bin"
            exit 1
          fi
          cp "${files[0]}" Portal-Android.apk
          ls -la

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: portal-android-latest
          name: Portal Android (последняя сборка CI)
          body: |
            Debug APK для **Share → Portal**. Файл обновляется после каждой успешной сборки.

            На Mac/Windows: в приложении Portal кнопка **📥 APK → Скачать APK**.
          artifacts: portal-android/bin/Portal-Android.apk
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: portal-debug-apk
          path: portal-android/bin/*.apk
          if-no-files-found: warn
