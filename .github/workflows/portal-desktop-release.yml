# Скопируй в репозиторий как: .github/workflows/portal-desktop-release.yml
# (шаблон в корне — чтобы push с PAT без scope `workflow` не блокировался.)
#
# Сборка Portal для macOS (.app) и Windows (.exe) через PyInstaller.
# Артефакты: Portal-macOS.zip, Portal.dmg, Portal-Windows.zip, PortalSetup.exe (Inno Setup)
# Релиз: push тега v* (например v1.2.0).
# Ручной запуск: Actions → «Portal Desktop Build» → Run workflow.

name: Portal Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - "v*"
    paths:
      - "portal_widget.py"
      - "portal_mac_hotkey_helper.py"
      - "portal.py"
      - "portal_config.py"
      - "MAC_PORTAL_HOTKEYS.md"
      - "pyinstaller_portal.spec"
      - "installer/**"
      - ".github/workflows/portal-desktop-release.yml"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Иконки (.icns / .ico / Android icon copy)
        run: python3 scripts/generate_branding_icons.py

      - name: PyInstaller (Portal.app)
        run: pyinstaller -y pyinstaller_portal.spec

      - name: ZIP для релиза
        run: cd dist && ditto -c -k --sequesterRsrc --keepParent Portal.app Portal-macOS.zip

      - name: DMG (Portal.app + ярлык Applications → /Applications)
        run: |
          set -e
          ST="dmg_stage"
          rm -rf "$ST"
          mkdir -p "$ST"
          cp -R "dist/Portal.app" "$ST/"
          ln -sf /Applications "$ST/Applications"
          hdiutil create -volname "Portal" -srcfolder "$ST" -ov -format UDZO "dist/Portal.dmg"

      # Плоские имена в корне job — иначе upload сохранит dist/… и релиз не найдёт файлы.
      - name: Подготовить upload (ZIP + DMG)
        run: |
          cp dist/Portal-macOS.zip Portal-macOS.zip
          cp dist/Portal.dmg Portal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Portal-macOS
          path: |
            Portal-macOS.zip
            Portal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow pywin32

      - name: Иконка .ico
        run: python scripts/generate_branding_icons.py

      - name: PyInstaller (Portal.exe + папка)
        run: pyinstaller -y pyinstaller_portal.spec

      - name: ZIP для релиза (портатив)
        shell: pwsh
        run: Compress-Archive -Path dist/Portal -DestinationPath dist/Portal-Windows.zip -Force

      - name: Inno Setup — PortalSetup.exe
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found (Inno Setup 6)" }
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v\d') {
            $ver = $ref.TrimStart('v')
          } else {
            $m = Select-String -Path portal_config.py -Pattern 'PORTAL_DESKTOP_VERSION = "([^"]+)"'
            $ver = $m.Matches[0].Groups[1].Value
          }
          Write-Host "Installer AppVersion: $ver"
          & $iscc "installer\PortalSetup.iss" "/DMyAppVersion=$ver"
          if (-not (Test-Path "dist\PortalSetup.exe")) { throw "dist\PortalSetup.exe missing" }

      - uses: actions/upload-artifact@v4
        with:
          name: Portal-Windows
          path: |
            dist/Portal-Windows.zip
            dist/PortalSetup.exe

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Portal-macOS
          path: rel

      - uses: actions/download-artifact@v4
        with:
          name: Portal-Windows
          path: rel

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Portal Desktop ${{ github.ref_name }}
          files: |
            rel/Portal-macOS.zip
            rel/Portal.dmg
            rel/Portal-Windows.zip
            rel/PortalSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
