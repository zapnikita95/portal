# Сборка Flutter-клиента (один код → Android APK; iOS — отдельный job без подписи).
# Артефакт: portal-flutter-apk. Релиз: тег portal-flutter-latest (обновляемый).
name: Portal Flutter Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "portal_flutter/**"
      - ".github/workflows/portal-flutter.yml"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Gradle/javac для плагинов (sqflite_android и др.) — API JDK 21; иначе падает compileReleaseJavaWithJavac.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # iOS Runner использует FlutterImplicitEngineDelegate / FlutterSceneDelegate (UIScene) — с Flutter 3.41+.
          flutter-version: "3.41.5"

      - name: Добавить android/ если только lib/ (каркас из репо)
        working-directory: portal_flutter
        run: |
          if [ ! -d android ]; then
            flutter create . --project-name portal_flutter --org org.portal --platforms=android
          fi

      - name: Патч AndroidManifest (cleartext, FGS, POST_NOTIFICATIONS)
        working-directory: portal_flutter
        run: python3 tool/patch_android_manifest.py

      - name: Патч Gradle (compileSdk 36, Java/Kotlin 21 для плагинов)
        working-directory: portal_flutter
        run: python3 tool/patch_android_gradle.py

      - name: Android SDK platform 36 (плагины compileSdk 36)
        run: |
          SDKM="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ -x "$SDKM" ]; then
            yes | "$SDKM" "platforms;android-36" >/dev/null
          elif command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager "platforms;android-36" >/dev/null
          fi

      - name: flutter pub get + иконки Android + analyze
        working-directory: portal_flutter
        run: |
          flutter pub get
          dart run flutter_launcher_icons -f tool/flutter_launcher_icons_ci.yaml
          flutter analyze --no-fatal-infos

      - name: Среда сборки (дебаг)
        working-directory: portal_flutter
        run: |
          set -x
          java -version
          echo "JAVA_HOME=${JAVA_HOME:-}"
          flutter --version
          flutter doctor -v

      - name: flutter build apk
        working-directory: portal_flutter
        env:
          # Реже падает «Kotlin compile daemon terminated» на shared runner.
          GRADLE_OPTS: -Dkotlin.compiler.execution.strategy=in-process
        run: |
          set -e
          if ! flutter build apk --release -v; then
            echo "::group::Gradle :app:assembleRelease --stacktrace (после падения flutter)"
            cd android
            chmod +x gradlew 2>/dev/null || true
            ./gradlew :app:assembleRelease --stacktrace --warning-mode all --no-daemon || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Стабильное имя для релиза
        working-directory: portal_flutter
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk Portal-Flutter.apk
          ls -la Portal-Flutter.apk

      - name: Publish APK to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: portal-flutter-latest
          name: Portal Flutter (CI)
          body: |
            **Основной мобильный клиент Portal** (Flutter). Kivy **Portal-Android.apk** — legacy/опционально.
            Установка: скачать `Portal-Flutter.apk` → разрешить установку из неизвестных источников.
          artifacts: portal_flutter/Portal-Flutter.apk
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: portal-flutter-apk
          path: portal_flutter/Portal-Flutter.apk
          if-no-files-found: error

  ios-nosign:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.5"

      - name: Добавить ios/ при необходимости
        working-directory: portal_flutter
        run: |
          if [ ! -d ios ]; then
            flutter create . --project-name portal_flutter --org org.portal --platforms=ios
          fi

      - name: Патч Info.plist (уведомления при приёме)
        working-directory: portal_flutter
        run: python3 tool/patch_ios_info_plist.py

      - name: Build iOS (без подписи — для локальной подписи / TestFlight)
        working-directory: portal_flutter
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter build ios --release --no-codesign

      - name: Архив Runner.app
        working-directory: portal_flutter
        run: |
          cd build/ios/iphoneos
          zip -r "$GITHUB_WORKSPACE/portal_flutter/Portal-Flutter-iOS-nosign.zip" Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: portal-flutter-ios-nosign
          path: portal_flutter/Portal-Flutter-iOS-nosign.zip
          if-no-files-found: warn
