name: portal_flutter
description: Portal mobile client — замена Kivy (Android + iOS, один код).
publish_to: "none"
version: 1.0.18+19

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  file_picker: ^8.0.3
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.10
  receive_sharing_intent: ^1.8.0
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  network_info_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/portal_main.gif
    - assets/branding/portal_icon.png

# iOS: всегда. Android: после `flutter create ... --platforms=android` смени на android: true и снова `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: false
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/portal_icon.png

# Локальная копия: в апстриме setOngoing(true) — уведомление FGS нельзя смахнуть после приёма.
dependency_overrides:
  flutter_background_service_android:
    path: packages/flutter_background_service_android
