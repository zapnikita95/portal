# Скопируй в репо как .github/workflows/portal-android-apk.yml
# (синхронизировано с корневым workflow в репозитории).
#
# — JDK 17 + фиксация JAVA_HOME (иначе runner отдаёт Java 11)
# — Cython < 3 (PyJNIUS / jnius_utils.pxi и long)
# — В CI одна ABI arm64-v8a
name: Portal Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "portal-android/**"
      - ".github/workflows/portal-android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Зафиксировать JAVA_HOME = JDK 17
        run: |
          echo "JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME}/bin" >> "$GITHUB_PATH"
          test -x "${JAVA_HOME}/bin/java"
          "${JAVA_HOME}/bin/java" -version

      - name: APT deps (Buildozer / p4a)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip python3-venv wget \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Pip (buildozer, cython 0.29.x)
        run: |
          python3 -m pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython>=0.29.36,<3.0"
          python3 -c "import Cython; print('Cython', Cython.__version__)"

      - name: Java sanity check
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          which javac && javac -version

      - name: CI — только arm64
        working-directory: portal-android
        run: |
          sed -i.bak 's/^android.archs = arm64-v8a,armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec || true
          grep -E '^android\.archs' buildozer.spec || true

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            portal-android/.buildozer
          key: buildozer-ci-v3-${{ runner.os }}-${{ hashFiles('portal-android/buildozer.spec', 'portal-android/**/*.py', '.github/workflows/portal-android-apk.yml') }}
          restore-keys: |
            buildozer-ci-v3-${{ runner.os }}-

      - name: buildozer android debug
        working-directory: portal-android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Xmx3584m -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
        run: buildozer android debug

      - name: Prepare APK for release (stable file name)
        working-directory: portal-android/bin
        run: |
          set -e
          shopt -s nullglob
          files=( *.apk )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No APK in portal-android/bin"
            exit 1
          fi
          cp "${files[0]}" Portal-Android.apk
          ls -la

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: portal-android-latest
          name: Portal Android (последняя сборка CI)
          body: |
            Debug APK для **Share → Portal**.

            *CI: архитектура **arm64-v8a**.*
          artifacts: portal-android/bin/Portal-Android.apk
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: portal-debug-apk
          path: portal-android/bin/*.apk
          if-no-files-found: warn
