# Скопируй этот файл в репозиторий как:
#   .github/workflows/portal-android-apk.yml
# (через веб GitHub: Add file → Create new file), если push workflow блокирует токен без scope «workflow».
#
# Сборка debug APK (Buildozer). Артефакт: portal-debug-apk
name: Portal Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "portal-android/**"
      - ".github/workflows/portal-android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: APT deps (Buildozer / p4a)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-venv wget \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Pip (buildozer, cython)
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            portal-android/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('portal-android/buildozer.spec', 'portal-android/**/*.py') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: buildozer android debug
        working-directory: portal-android
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: portal-debug-apk
          path: portal-android/bin/*.apk
          if-no-files-found: warn
