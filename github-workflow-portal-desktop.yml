# Скопируй в репозиторий как: .github/workflows/portal-desktop-release.yml
# (актуальная копия в репо: .github/workflows/portal-desktop-release.yml)
#
# Артефакты: Portal-macOS.zip, Portal-macOS.dmg, Portal-Windows.zip, PortalSetup.exe (Inno)

name: Portal Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow
      - run: python3 scripts/generate_branding_icons.py
      - run: pyinstaller -y pyinstaller_portal.spec
      - run: cd dist && ditto -c -k --sequesterRsrc --keepParent Portal.app Portal-macOS.zip
      - run: |
          set -e
          ST="dmg_stage"
          rm -rf "$ST"
          mkdir -p "$ST"
          cp -R "dist/Portal.app" "$ST/"
          ln -sf /Applications "$ST/Applications"
          hdiutil create -volname "Portal" -srcfolder "$ST" -ov -format UDZO "dist/Portal.dmg"
      - run: |
          cp dist/Portal-macOS.zip Portal-macOS.zip
          cp dist/Portal.dmg Portal.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Portal-macOS
          path: |
            Portal-macOS.zip
            Portal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow pywin32
      - run: python scripts/generate_branding_icons.py
      - run: pyinstaller -y pyinstaller_portal.spec
      - shell: pwsh
        run: Compress-Archive -Path dist/Portal -DestinationPath dist/Portal-Windows.zip -Force
      - name: Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC not found" }
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v\d') { $ver = $ref.TrimStart('v') } else {
            $ver = (Select-String -Path portal_config.py -Pattern 'PORTAL_DESKTOP_VERSION = "([^"]+)"').Matches[0].Groups[1].Value
          }
          & $iscc "installer\PortalSetup.iss" "/DMyAppVersion=$ver"
      - uses: actions/upload-artifact@v4
        with:
          name: Portal-Windows
          path: |
            dist/Portal-Windows.zip
            dist/PortalSetup.exe

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Portal-macOS
          path: rel
      - uses: actions/download-artifact@v4
        with:
          name: Portal-Windows
          path: rel
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Portal Desktop ${{ github.ref_name }}
          files: |
            rel/Portal-macOS.zip
            rel/Portal.dmg
            rel/Portal-Windows.zip
            rel/PortalSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
